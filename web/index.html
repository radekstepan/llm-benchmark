<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LLM Benchmark</title>
<link rel="stylesheet" href="./styles.css">
</head>
<body>

<header class="hdr">
  <a class="logo" href="/">
    <div class="logo-mark">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="1.5" y="9" width="3" height="5.5" fill="white" rx=".8"/>
        <rect x="6.5" y="5" width="3" height="9.5" fill="white" rx=".8"/>
        <rect x="11.5" y="1.5" width="3" height="13" fill="white" rx=".8"/>
      </svg>
    </div>
    llm-benchmark
  </a>
  <span class="hdr-meta" id="hdr-meta"></span>
</header>

<div class="toolbar" id="toolbar">
  <div class="fg">
    <span class="fg-label">Device</span>
    <div class="selector" id="device-select"></div>
  </div>
  <div class="fg">
    <span class="fg-label">Model</span>
    <div class="selector" id="model-select"></div>
  </div>
</div>

<main class="main">
  <div class="cgrid">
    <div class="card">
      <div class="card-head">
        <span class="card-title">Throughput</span>
        <span class="card-unit">tokens / second</span>
      </div>
      <svg id="tps-svg" class="ch-svg"></svg>
      <div class="legend" id="tps-leg"></div>
    </div>
    <div class="card">
      <div class="card-head">
        <span class="card-title">Time to First Token</span>
        <span class="card-unit">latency</span>
      </div>
      <svg id="ttft-svg" class="ch-svg"></svg>
      <div class="legend" id="ttft-leg"></div>
    </div>
  </div>
  <section class="table-card" aria-labelledby="summary-title">
    <div class="table-head">
      <div>
        <h2 class="table-title" id="summary-title">Model Snapshot</h2>
        <p class="table-copy">A compact comparison of context ceiling, peak throughput, and best first-token latency.</p>
      </div>
    </div>
    <div class="table-wrap">
      <table class="stats-table">
        <thead>
          <tr>
            <th scope="col">Model</th>
            <th scope="col">Max context</th>
            <th scope="col">Peak throughput</th>
            <th scope="col">Best TTFT</th>
            <th scope="col">Samples</th>
            <th scope="col">Key window</th>
          </tr>
        </thead>
        <tbody id="stats-body"></tbody>
      </table>
    </div>
  </section>
</main>

<div id="tip" style="display:none"></div>

<script type="module" src="./main.ts"></script>
</body>
</html>
